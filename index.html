<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Майданчик Мавки</title>

    <link rel="icon" type="image/png" href="/майданчик.png" />
    <link rel="icon" sizes="any" type="image/svg+xml" href="/майданчик.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #121212;
        }
      }

      body {
        background-color: var(--bg-color);
        transition: background-color 0.3s ease;
        margin: 0;
      }

      .UiAppLoading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color);
        transition: background-color 0.3s ease;
      }

      .UiAppLoading svg {
        overflow: hidden;
      }

      .UiAppLoading #mask0_912_38 circle {
        animation: shrinkMask 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        transform-origin: 28.5px 28.5px;
      }

      .UiAppLoading g rect {
        animation-duration: 2s;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-iteration-count: infinite;
      }

      .UiAppLoading g rect:nth-child(2) {
        animation-name: microConvergeBlueTop;
      }

      .UiAppLoading g rect:nth-child(3) {
        animation-name: microConvergeYellow;
      }

      .UiAppLoading g rect:nth-child(4) {
        animation-name: microConvergeBlack;
      }

      .UiAppLoading g rect:nth-child(5) {
        animation-name: microConvergeBlueBottom;
      }

      @keyframes shrinkMask {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(0.96);
        }
      }

      @keyframes microConvergeBlueTop {
        0%,
        100% {
          transform: matrix(-0.730923, 0.68246, -0.730923, -0.68246, 69.998, 28.4978);
        }
        50% {
          transform: matrix(-0.730923, 0.68246, -0.730923, -0.68246, 69.2, 29.2);
        }
      }

      @keyframes microConvergeYellow {
        0%,
        100% {
          transform: matrix(-0.730923, -0.68246, 0.730923, -0.68246, 16.9858, 78);
        }
        50% {
          transform: matrix(-0.730923, -0.68246, 0.730923, -0.68246, 17.7, 77.2);
        }
      }

      @keyframes microConvergeBlack {
        0%,
        100% {
          transform: matrix(1, -0.0000256254, 0.000117756, 1, 0.000488281, -5.14282);
        }
        50% {
          transform: matrix(1, -0.0000256254, 0.000117756, 1, 1.2, -5.14282);
        }
      }

      @keyframes microConvergeBlueBottom {
        0%,
        100% {
          transform: matrix(-0.730923, 0.68246, -0.730923, -0.68246, 48.998, 8.49805);
        }
        50% {
          transform: matrix(-0.730923, 0.68246, -0.730923, -0.68246, 48.2, 9.2);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div class="UiAppLoading">
      <svg
        width="57"
        height="57"
        viewBox="0 0 57 57"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <mask
          id="mask0_912_38"
          style="mask-type: alpha"
          maskUnits="userSpaceOnUse"
          x="0"
          y="0"
          width="57"
          height="57"
        >
          <circle cx="28.5" cy="28.5" r="28.5" fill="white" />
        </mask>
        <g mask="url(#mask0_912_38)">
          <rect x="3.43213" y="9.27515" width="32.5992" height="36.8458" fill="#B3271A" />
          <rect
            width="23.2378"
            height="72.5287"
            transform="matrix(-0.730923 0.68246 -0.730923 -0.68246 69.998 28.4978)"
            fill="#375BB6"
          />
          <rect
            width="23.2378"
            height="72.5307"
            transform="matrix(-0.730923 -0.68246 0.730923 -0.68246 16.9858 78)"
            fill="#F3D74B"
          />
          <rect
            width="24.0205"
            height="67.2836"
            transform="matrix(1 -2.56254e-05 0.000117756 1 0.000488281 -5.14282)"
            fill="black"
          />
          <rect
            width="23.2378"
            height="72.5287"
            transform="matrix(-0.730923 0.68246 -0.730923 -0.68246 48.998 8.49805)"
            fill="#375BB6"
          />
        </g>
      </svg>
    </div>

    <script src="https://веб.мавка.укр/mavka_web.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
